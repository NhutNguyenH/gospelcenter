     ===========================================================================

     Mục đích: Khi anh muốn thử widget mới trên một trang riêng TRƯỚC khi
     merge vào main / production.

     Cách dùng:
     1. Tạo feature branch: git checkout -b feature/<tên-tính-năng>
     2. Push branch lên GitHub: git push -u origin feature/<tên-tính-năng>
     3. Mở file này, đổi `feature/test` trong URL <script src=...> phía dưới
        thành tên branch của anh.
     4. Tạo trang TEST trong builder (vd /test-widget) — đừng link từ menu
        chính, đừng publish lên SEO/sitemap.
     5. Paste toàn bộ nội dung file này vào HTML widget của trang test.
     6. Mở trang test trong InPrivate Edge → kiểm tra.
     7. Khi OK, merge branch vào main → xóa/disable trang test → re-paste
        widget.html (URL @HEAD) vào trang production.

     URL pattern jsDelivr cho branch:
       https://cdn.jsdelivr.net/gh/NhutNguyenH/gospelcenter@<BRANCH>/widget.js

     Branch có dấu `/` (như feature/foo) vẫn OK.

     Purge cache cho branch URL nếu cần:
       https://purge.jsdelivr.net/gh/NhutNguyenH/gospelcenter@<BRANCH>/widget.js
